<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Dama Online - Pro Edition</title>
    <style>
        :root { --accent: #00f2ff; --bg: #121212; --panel: #1e1e1e; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Layout */
        .main-layout { display: flex; gap: 20px; align-items: flex-start; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        
        /* Controls & Lobby */
        .controls { background: var(--panel); padding: 15px; border-radius: 10px; display: flex; gap: 10px; align-items: center; border: 1px solid #333; margin-bottom: 10px; width: 90%; max-width: 900px; }
        input, select, button { padding: 8px 12px; border-radius: 5px; border: 1px solid #444; background: #121212; color: white; cursor: pointer; }
        button { background: #333; border: none; font-weight: bold; }
        button:hover { background: #444; color: var(--accent); }
        #status { font-size: 1.2rem; color: #ffcc00; font-weight: bold; margin: 5px; }

        /* Chat */
        #chat-box { width: 280px; height: 530px; background: var(--panel); border-radius: 10px; display: flex; flex-direction: column; border: 2px solid #333; }
        #chat-messages { flex-grow: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; font-size: 0.85rem; }
        .msg { padding: 5px 10px; border-radius: 5px; max-width: 80%; }
        .msg.system { background: #333; color: var(--accent); align-self: center; font-size: 0.75rem; }
        .msg.yellow { background: #444400; align-self: flex-start; }
        .msg.red { background: #440000; align-self: flex-end; }
        #chat-input { padding: 10px; background: #222; border: none; color: white; border-top: 1px solid #333; outline: none; }

        /* Board */
        #board { display: grid; grid-template-columns: repeat(8, 65px); grid-template-rows: repeat(8, 65px); border: 10px solid #222; position: relative; }
        .sq { width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; }
        .black { background: #000; }
        .white { background: #3a3a3a; }
        .piece { width: 50px; height: 50px; border-radius: 50%; border: 4px solid; transition: 0.2s; position: relative; cursor: pointer; }
        .red { border-color: #ff4444; background: #990000; }
        .yellow { border-color: #ffff00; background: #999900; }
        .king::after { content: '★'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; }
        .selected { outline: 3px solid var(--accent); transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="username" placeholder="Nickname">
        <select id="gameMode">
            <option value="ai">Vs. Gemini AI</option>
            <option value="pvp">Online Multiplayer</option>
        </select>
        <button onclick="handlePlayClick()">Play / Search</button>
        <div id="lobby-status">Status: Offline</div>
    </div>

    <div id="status">Ready</div>

    <div class="main-layout">
        <div id="chat-box">
            <div id="chat-messages"><div class="msg system">Welcome to Dama Online.</div></div>
            <input type="text" id="chat-input" placeholder="Press Enter to chat..." onkeypress="sendChat(event)">
        </div>

        <div id="board">
            <div id="overlay">
                <h1 id="winText">WINNER!</h1>
                <button onclick="location.reload()">New Game</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- GAME STATE ---
    const RED = -1, YELLOW = 1, R_KING = -2, Y_KING = 2, EMPTY = 0;
    let board = [];
    let turn = YELLOW;
    let selected = null;
    let myColor = null; // YELLOW or RED
    let roomId = null;
    let isAiMode = true;

    // --- MATCHMAKING ---
    window.handlePlayClick = function() {
        const mode = document.getElementById('gameMode').value;
        const name = document.getElementById('username').value || "Guest";
        
        if (mode === 'ai') {
            isAiMode = true;
            initLocalGame();
        } else {
            isAiMode = false;
            startMatchmaking(name);
        }
    };

    function startMatchmaking(name) {
        const status = document.getElementById('lobby-status');
        status.innerText = "Searching...";
        const queueRef = ref(db, 'waiting_room');

        onValue(queueRef, (snap) => {
            const waiting = snap.val();
            if (waiting) {
                const opponentId = Object.keys(waiting)[0];
                roomId = `room_${opponentId}`;
                myColor = RED;
                set(ref(db, `rooms/${roomId}`), {
                    board: "start",
                    turn: YELLOW,
                    playerY: waiting[opponentId].name,
                    playerR: name
                });
                remove(ref(db, `waiting_room/${opponentId}`));
                setupOnlineGame();
            } else {
                const myId = push(queueRef, { name }).key;
                myColor = YELLOW;
                status.innerText = "Waiting for opponent...";
                onDisconnect(ref(db, `waiting_room/${myId}`)).remove();
                onValue(ref(db, `rooms/room_${myId}`), (roomSnap) => {
                    if (roomSnap.exists()) {
                        roomId = `room_${myId}`;
                        setupOnlineGame();
                    }
                });
            }
        }, { onlyOnce: true });
    }

    function setupOnlineGame() {
        document.getElementById('lobby-status').innerText = `Online: Playing as ${myColor === YELLOW ? 'Yellow' : 'Red'}`;
        initLocalGame(true);
        onValue(ref(db, `rooms/${roomId}/board`), (snap) => {
            if (snap.val() && snap.val() !== "start") {
                board = snap.val();
                render();
            }
        });
        onValue(ref(db, `rooms/${roomId}/turn`), (snap) => {
            if (snap.exists()) {
                turn = snap.val();
                updateStatus();
            }
        });
    }

    // --- CORE GAME LOGIC ---
    function initLocalGame(online = false) {
        board = Array(8).fill().map(() => Array(8).fill(EMPTY));
        const bDiv = document.getElementById('board');
        Array.from(bDiv.children).forEach(c => { if(c.id !== 'overlay') bDiv.removeChild(c); });

        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                const sq = document.createElement('div');
                sq.className = `sq ${(r+c)%2==0?'white':'black'}`;
                sq.onclick = () => handleClick(r, c);
                bDiv.appendChild(sq);
                if((r+c)%2 !== 0) {
                    if(r < 3) board[r][c] = RED;
                    else if(r > 4) board[r][c] = YELLOW;
                }
            }
        }
        if(!online) myColor = YELLOW;
        render();
    }

    function handleClick(r, c) {
        if (!isAiMode && turn !== myColor) return;
        
        const moves = getAllValidMoves(board, turn);
        if (Math.sign(board[r][c]) === turn) {
            selected = {r, c};
        } else if (selected) {
            const move = moves.find(m => m.from.r === selected.r && m.from.c === selected.c && m.to.r === r && m.to.c === c);
            if (move) {
                applyMove(board, move);
                turn = -turn;
                selected = null;
                if (!isAiMode) {
                    set(ref(db, `rooms/${roomId}/board`), board);
                    set(ref(db, `rooms/${roomId}/turn`), turn);
                } else if (turn === RED) {
                    setTimeout(aiPlay, 600);
                }
            }
        }
        render();
    }

    function applyMove(state, move) {
        let p = state[move.from.r][move.from.c];
        if(move.to.r === 0 && p === YELLOW) p = Y_KING;
        if(move.to.r === 7 && p === RED) p = R_KING;
        state[move.to.r][move.to.c] = p;
        state[move.from.r][move.from.c] = EMPTY;
        if(move.cap) state[move.cap.r][move.cap.c] = EMPTY;
    }

    function render() {
        const divs = document.querySelectorAll('.sq');
        let i = 0;
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                const div = divs[i++];
                div.innerHTML = '';
                const v = board[r][c];
                if (v !== EMPTY) {
                    const p = document.createElement('div');
                    p.className = `piece ${v < 0 ? 'red' : 'yellow'} ${Math.abs(v) === 2 ? 'king' : ''}`;
                    if (selected && selected.r === r && selected.c === c) p.classList.add('selected');
                    div.appendChild(p);
                }
            }
        }
        updateStatus();
    }

    function updateStatus() {
        const s = document.getElementById('status');
        if (turn === YELLOW) { s.innerText = "Yellow's Turn"; s.style.color = "yellow"; }
        else { s.innerText = "Red's Turn"; s.style.color = "red"; }
    }

    function getAllValidMoves(state, p) {
        let moves = [];
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                if(Math.sign(state[r][c]) === p) {
                    // Simple move logic (simplified for space)
                    const dirs = [[-1,1],[-1,-1],[1,1],[1,-1]];
                    dirs.forEach(([dr, dc]) => {
                        const nr = r+dr, nc = c+dc;
                        if(nr>=0 && nr<8 && nc>=0 && nc<8 && state[nr][nc] === EMPTY) 
                            moves.push({from:{r,c}, to:{r:nr,c:nc}});
                        const jr = r+dr*2, jc = c+dc*2;
                        if(jr>=0 && jr<8 && jc>=0 && jc<8 && state[nr][nc]!==EMPTY && Math.sign(state[nr][nc])!==p && state[jr][jc]===EMPTY)
                            moves.push({from:{r,c}, to:{r:jr,c:jc}, cap:{r:nr,c:nc}});
                    });
                }
            }
        }
        const caps = moves.filter(m => m.cap);
        return caps.length > 0 ? caps : moves;
    }

    window.sendChat = function(e) {
        if(e.key === 'Enter') {
            const msg = e.target.value;
            if(!msg) return;
            const type = myColor === YELLOW ? 'yellow' : 'red';
            const log = document.getElementById('chat-messages');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.innerText = msg;
            log.appendChild(d);
            e.target.value = '';
            log.scrollTop = log.scrollHeight;
        }
    }

    // AI logic (simplified version of the expert minimax)
    function aiPlay() {
        const moves = getAllValidMoves(board, RED);
        if(moves.length > 0) {
            const m = moves[Math.floor(Math.random()*moves.length)];
            applyMove(board, m);
            turn = YELLOW;
            render();
        }
    }

</script>
</body>
</html>
